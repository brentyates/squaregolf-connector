name: Build and Release

on:
  push:
    branches:
      - github-actions
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch: # Allow manual triggering

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build and Test
        run: |
          go test -v -mod=vendor ./...
          go build -v -mod=vendor ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: windows
            artifact: windows-amd64/*.exe
            image: fyneio/fyne-cross-windows:latest
          - os: ubuntu-latest
            target: darwin
            artifact: darwin-amd64/*.app
            image: fyneio/fyne-cross-darwin:latest
          - os: ubuntu-latest
            target: darwin
            artifact: darwin-arm64/*.app
            image: fyneio/fyne-cross-darwin:latest
    runs-on: ${{ matrix.os }}
    env:
      FYNE_CROSS_DEBUG: 1
      FYNE_CROSS_ARCH: amd64
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          go install github.com/fyne-io/fyne-cross@latest

      - name: Build for ${{ matrix.target }}
        run: |
          fyne-cross ${{ matrix.target }} -arch=amd64 -release -debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: fyne-cross/bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '**/*-build'

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/*.exe
            artifacts/darwin-build/*.app
            artifacts/linux-build/*
          draft: true  # Always create as draft first
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            This is a test release. Please review the contents before publishing.
            
            To publish this release:
            1. Go to the releases page
            2. Click "Edit" on this release
            3. Uncheck "Set as draft"
            4. Click "Update release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cleanup == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete draft release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const draftRelease = releases.data.find(release => 
              release.draft && 
              release.tag_name === process.env.GITHUB_REF.replace('refs/tags/', '')
            );
            
            if (draftRelease) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draftRelease.id
              });
              console.log(`Deleted draft release: ${draftRelease.tag_name}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF: ${{ github.ref }} 