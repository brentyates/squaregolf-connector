name: Build and Release

on:
  push:
    branches:
      - github-actions
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch: # Allow manual triggering

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build and Test
        run: |
          go test -v -mod=vendor ./...
          go build -v -mod=vendor ./...

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for Windows
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          fyne package -os windows

  build-darwin:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for Mac
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          fyne package -os darwin

  release:
    needs: [build-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '**/*-build'

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/*.exe
            artifacts/darwin-amd64-build/*.app
            artifacts/darwin-arm64-build/*.app
          draft: true  # Always create as draft first
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            This is a test release. Please review the contents before publishing.
            
            To publish this release:
            1. Go to the releases page
            2. Click "Edit" on this release
            3. Uncheck "Set as draft"
            4. Click "Update release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cleanup == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete draft release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const draftRelease = releases.data.find(release => 
              release.draft && 
              release.tag_name === process.env.GITHUB_REF.replace('refs/tags/', '')
            );
            
            if (draftRelease) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draftRelease.id
              });
              console.log(`Deleted draft release: ${draftRelease.tag_name}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF: ${{ github.ref }} 